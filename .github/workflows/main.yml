name: main

on:
  push:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang binutils libc6-dev

      - name: ci
        run: make ci
